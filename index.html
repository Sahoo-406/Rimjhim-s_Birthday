<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* RAINBOW BACKGROUND */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,red,orange,yellow,green,blue,indigo,violet);
background-size:1400% 1400%;
animation:rainbowMove 18s linear infinite;
}

@keyframes rainbowMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CARD */

.container{
width:520px;
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,0.35);
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* TITLE */

h1{
font-size:40px;
color:#ff2f6d;
letter-spacing:2px;
text-shadow:
0 0 4px #fff,
0 0 8px #fff,
0 0 12px #ff6fa5,
0 0 20px #ff2f6d;
animation:titleGlow 1.8s infinite alternate;
}

@keyframes titleGlow{
from{
text-shadow:
0 0 4px #fff,
0 0 8px #fff,
0 0 12px #ff6fa5,
0 0 20px #ff2f6d;
}
to{
text-shadow:
0 0 6px #fff,
0 0 12px #fff,
0 0 18px #ff85b5,
0 0 30px #ff2f6d;
}
}

.subtitle{
margin:20px;
color:#333;
}

/* PHOTO */

.photo{
width:260px;
height:260px;
object-fit:cover;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
border:6px solid #4dabf7;
transition:0.5s;
}

.photo:hover{
transform:scale(1.07);
}

/* BUTTON */

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff4d6d,#4dabf7,#6a5cff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

/* MESSAGE */

#message{
margin-top:20px;
font-size:20px;
color:#ff2f6d;
font-weight:bold;
}

/* FLOATING PARTICLES */

.particle{
position:absolute;
pointer-events:none;
animation:float linear infinite;
}

.star{
color:white;
text-shadow:0 0 6px white,0 0 12px white,0 0 18px #9be7ff;
}

.heart{
text-shadow:0 0 8px rgba(255,255,255,0.8);
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
30%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* CONFETTI */

.confetti{
position:absolute;
width:8px;
height:8px;
background:red;
animation:confettiFall 3s linear forwards;
}

@keyframes confettiFall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday My Rimjhim 🥰🌹✨</h1>

<p class="subtitle">A small surprise made with love just for you</p>

<img src="photo.jpg" class="photo" alt="Our Photo">

<br>

<button onclick="showMessage()">Open Your Surprise</button>

<p id="message"></p>

</div>

<script>

/* HEART COLORS */

const heartColors=[
"#ff4d6d",
"#ff7a18",
"#ffd93d",
"#6bcB77",
"#4dabf7",
"#7b5cff",
"#ff85c0"
];

/* FLOATING PARTICLES */

for(let i=0;i<100;i++){

let p=document.createElement("div");

p.classList.add("particle");

if(Math.random()>0.5){

p.classList.add("star");
p.innerHTML="✦";

}else{

p.classList.add("heart");
p.innerHTML="❤";
p.style.color=heartColors[Math.floor(Math.random()*heartColors.length)];

}

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*6)+"s";
p.style.fontSize=(16+Math.random()*10)+"px";

document.body.appendChild(p);

}

/* MESSAGE + CONFETTI */

function showMessage(){

let text="I Love You Soo Soo Much Jaan 🌼🌻✨💫";

let i=0;

document.getElementById("message").innerHTML="";

function type(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(type,40);

}

}

type();

/* CONFETTI EFFECT */

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.classList.add("confetti");

c.style.left=Math.random()*100+"vw";

c.style.background=heartColors[Math.floor(Math.random()*heartColors.length)];

c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

}

}

</script>

</body>
</html>
