<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

/* RAINBOW BACKGROUND */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,red,orange,yellow,green,blue,indigo,violet);
background-size:1400% 1400%;
animation:rainbowMove 18s linear infinite;
}

@keyframes rainbowMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CARD */
.container{
width:520px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(6px);
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,0.35);
position:relative;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

h1{
font-size:40px;
color:#ff2f6d;
margin-bottom:10px;
font-weight:700;
letter-spacing:2px;
text-shadow:
0 0 4px #ffffff,
0 0 8px #ffffff,
0 0 12px #ff6fa5,
0 0 20px #ff2f6d;
animation:titleGlow 1.8s ease-in-out infinite alternate;
}

@keyframes titleGlow{
0%{
text-shadow:
0 0 4px #ffffff,
0 0 8px #ffffff,
0 0 12px #ff6fa5,
0 0 20px #ff2f6d;
}
100%{
text-shadow:
0 0 6px #ffffff,
0 0 12px #ffffff,
0 0 18px #ff85b5,
0 0 30px #ff2f6d;
}
}
100%{
text-shadow:
0 0 10px #ff4d88,
0 0 18px #ff4d88,
0 0 28px #ff9fc0,
0 0 40px #ff9fc0;
}
}

.subtitle{color:#333;margin-bottom:25px;font-size:16px}

.photo{
width:260px;height:260px;object-fit:cover;border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
transition:.5s;border:6px solid #4dabf7;
}

.photo:hover{transform:scale(1.07) rotate(1deg)}

button{
margin-top:28px;padding:14px 32px;border:none;border-radius:40px;
background:linear-gradient(45deg,#ff4d6d,#4dabf7,#6a5cff);
color:white;font-size:16px;cursor:pointer;transition:.3s
}

button:hover{transform:scale(1.1);box-shadow:0 12px 25px rgba(0,0,0,0.35)}

#message{margin-top:20px;font-weight:600;font-size:18px;color:#ff2f6d;min-height:24px}
.footer{margin-top:30px;font-size:14px;color:#222}

/* PARTICLES */
.particle{
position:absolute;
opacity:0.9;
animation:particleFloat linear infinite;
pointer-events:none;
}

/* brighter glitter stars */
.star{
color:white;
text-shadow:0 0 6px white,0 0 12px white,0 0 18px #9be7ff;
}

/* hearts */
.heartSmall{
text-shadow:0 0 8px rgba(255,255,255,0.8);
}

@keyframes particleFloat{
0%{transform:translateY(100vh) scale(.6);opacity:0}
30%{opacity:1}
100%{transform:translateY(-10vh) scale(1);opacity:0}
}

</style>
</head>

<body>

<div class="container">
<h1>Happy Birthday My Rimjhim 🥰🌹✨</h1>
<p class="subtitle">A small surprise made with love just for you</p>

<img src="https://github.com/Sahoo-406/Rimjhim-s_Birthday/blob/main/photo.jpg.jpeg" class="photo" alt="Our Photo">

<button onclick="showMessage()">Open Your Surprise</button>

<p id="message"></p>

<p class="footer">No matter where life goes, you matter more than you know 💖</p>
</div>

<script>

/* COLORS that match rainbow background */
const heartColors=[
"#ff4d6d",
"#ff7a18",
"#ffd93d",
"#6bcB77",
"#4dabf7",
"#7b5cff",
"#ff85c0"
];

/* create MANY particles */
for(let i=0;i<90;i++){
let p=document.createElement("div");
p.classList.add("particle");

if(Math.random()>0.45){
/* glitter star */
p.classList.add("star");
p.innerHTML="✦";
}else{
/* heart */
p.classList.add("heartSmall");
p.innerHTML="❤";
p.style.color=heartColors[Math.floor(Math.random()*heartColors.length)];
}

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*6)+"s";
p.style.fontSize=(16+Math.random()*10)+"px";

document.body.appendChild(p);
}

function showMessage(){
let text="I Love You Soo Soo Much Jaan 🌼🌻✨💫 ";
let i=0;let speed=40;
function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;setTimeout(typeWriter,speed);
}}
document.getElementById("message").innerHTML="";
typeWriter();
}

</script>

</body>
</html>
